# Monkey-Collector — 수집 파라미터.
#
# Resolution order (later wins):
#   builtin defaults (src/monkey_collector/config.py) → run.yaml → MC_* env vars → CLI flags
#
# CLI flags take highest precedence. Operational flags (--force, --new-session, --apps)
# are CLI-only — not configurable here.
#
# Experiment runs sweep several keys. Canonical git default: exploration.strategy=BFS,
# exploration.sibling_skip=false, exploration.sibling_skip_threshold=4,
# exploration.struct_novelty_rank=false,
# collection.max_steps=1500, collection.action_delay_ms=1500,
# collection.budget_mode=time, collection.max_duration=2h,
# collection.signal_timeout_sec=12, collection.poke_delay_sec=1.5,
# collection.max_action_repeats=8,
# collection.max_steps_without_new_page=98,
# screen_matching.luminance_prefilter=true, screen_matching.persist_filtered=true,
# screen_matching.bm25_top_k=5, screen_matching.element_criterion=diff,
# screen_matching.element_diff_max=5, screen_matching.element_jaccard_min=0.5,
# screen_matching.page_pixel_diff_threshold=0.3,
# screen_matching.canvas_merge=false, screen_matching.canvas_min_area_frac=0.7,
# screen_matching.package_guard=true. Reset to these before committing.

exploration:
  # Traversal strategy. Options: DFS | BFS | GREEDY
  #   GREEDY: navigate to the nearest unexplored screen (minimum navigation cost) — current default
  #   BFS:    navigate to the shallowest unexplored screen (closest to app root first)
  #   DFS:    navigate to the deepest unexplored screen (deepest reachable screen first)
  # Env: MC_EXPLORATION_STRATEGY
  strategy: BFS
  # --- Structural sibling handling (C1 / C1b) ---
  # Long lists (files, contacts, media) expose every row as its own frontier
  # element, so a 50-row list can burn 50 steps tapping siblings that all do the
  # same thing. These two knobs close that gap by keying on an element's
  # structure (tag:type:WxH) instead of its content.
  #
  # sibling_skip (C1): once the SAME (page, structure, action) has fired more
  # than sibling_skip_threshold times and every firing landed on ONE destination
  # page, the remaining siblings are HARD-skipped from the frontier — which also
  # lets the has_unvisited / plateau early-stop see the real (smaller) frontier
  # and reclaim budget. A group that reaches two-or-more distinct destinations is
  # never skipped (permanent non-skip). Scrollables are exempt.
  # Env: MC_EXPLORATION_SIBLING_SKIP
  #
  # ⚠️ DEFAULT OFF — NOT PROMOTED YET. Staged behind the knob for a controlled
  # ablation before any default flip (same discipline as screen_matching.
  # canvas_merge): turn on only for an experiment arm, never for corpus
  # collection, until the ablation clears it.
  sibling_skip: false
  # Distinct firings of one (page, structure, action) above which the group may
  # saturate (paired with the single-destination test above).
  # Env: MC_EXPLORATION_SIBLING_SKIP_THRESHOLD
  sibling_skip_threshold: 4
  # struct_novelty_rank (C1b): add a top-priority ranking tier that prefers an
  # element whose STRUCTURE has not been exercised for this action anywhere yet,
  # over one whose sibling shape was already tried. Soft (ranking only, no skip).
  # Same experiment-arm caveat as sibling_skip. Env: MC_EXPLORATION_STRUCT_NOVELTY_RANK
  struct_novelty_rank: false

collection:
  # Max steps per app session. Env: MC_COLLECTION_MAX_STEPS
  max_steps: 1500
  # Random seed for the explorer. Env: MC_COLLECTION_SEED
  seed: 42
  # Delay between actions (milliseconds). Env: MC_COLLECTION_ACTION_DELAY_MS
  action_delay_ms: 1500
  # TCP server port. Env: MC_COLLECTION_PORT
  port: 12345
  # Durable data root (pages/observations, page_graph). Env: MC_COLLECTION_DATA_DIR
  data_dir: data
  # Ephemeral runtime root (metadata, events.jsonl, cost/coverage CSVs). Env: MC_COLLECTION_RUNTIME_DIR
  runtime_dir: runtime
  # Session end condition. Options: time | steps
  #   time:  run until max_duration elapses (product default)
  #   steps: run until max_steps actions (legacy)
  # Env: MC_COLLECTION_BUDGET_MODE
  budget_mode: time
  # Wall-clock budget when budget_mode=time. Formats: 2h / 120m / 7200s / 7200
  # (bare number = seconds). Env: MC_COLLECTION_MAX_DURATION
  max_duration: 2h
  # Per-signal wait (seconds) before a stuck screen escalates: nudge on timeouts
  # 1-2, force-relaunch on the 3rd (recovery.MAX_SIGNAL_TIMEOUTS), so worst-case
  # one stuck episode waits signal_timeout_sec×3. Env: MC_COLLECTION_SIGNAL_TIMEOUT_SEC
  signal_timeout_sec: 12
  # Silence (seconds) inside one signal wait after which the server pokes the
  # client with a CAPTURE request (up to recovery.MAX_POKES_PER_WAIT = 2 times).
  # The client only pushes a frame when the accessibility service sees a change,
  # so a settled screen that fired no event stays silent for the whole timeout
  # window even though it has a frame to give. The pokes are carved OUT of
  # signal_timeout_sec, so the total wait — and the escalation timing above — is
  # unchanged. 0 or negative (or >= signal_timeout_sec) disables poking.
  # Env: MC_COLLECTION_POKE_DELAY_SEC
  poke_delay_sec: 1.5
  # Repeat-action circuit breaker: max times the same (page, action, element)
  # may execute on a page before the next attempt breaks out via back/relaunch,
  # killing the fruitless page ping-pong behind R2 volume-not-diversity. Counter
  # resets on any new page. 0 or negative disables the guard (tests/experiments).
  # Env: MC_COLLECTION_MAX_ACTION_REPEATS
  max_action_repeats: 8
  # Plateau early-stop: real-action steps with no new page after which the
  # session clean-stops (app treated as saturated → marked completed; re-collect
  # with --force). 0 or negative disables the guard (tests/experiments).
  # 98 = 2x the largest productive gap in the archive (49 steps); the margin
  # covers the 2h budget, whose gaps are unobserved.
  # Env: MC_COLLECTION_MAX_STEPS_WITHOUT_NEW_PAGE
  max_steps_without_new_page: 98

llm:
  # Input text generation mode. Options: api | random
  #   api    = OpenRouter LLM (requires OPENROUTER_API_KEY)
  #   random = hardcoded fallback (no API cost)
  # The LLM is used for input-text generation ONLY.
  # Env: MC_LLM_INPUT_MODE
  input_mode: api

screen_matching:
  # Luminance prefilter (MobileGPT-V2 port). Governs the tighter OBSERVATION
  # dedup AND supplies the fingerprints for the PAGE-level pixel gate. Off ⇒ the
  # pixel gate abstains and the element criterion alone decides a merge. Default ON.
  # Env: MC_SCREEN_MATCHING_LUMINANCE_PREFILTER
  luminance_prefilter: true
  # Per-pixel brightness |ΔY| above which a pixel counts as "changed" (0–255).
  # Env: MC_SCREEN_MATCHING_LUMINANCE_THRESHOLD
  luminance_threshold: 10
  # Changed-pixel fraction below which two renders are the same OBSERVATION.
  # Env: MC_SCREEN_MATCHING_SCREENSHOT_DIFF_THRESHOLD
  screenshot_diff_threshold: 0.02
  # Downscale width (px) for the luminance fingerprint.
  # Env: MC_SCREEN_MATCHING_LUMINANCE_LOW_RES_WIDTH
  luminance_low_res_width: 100
  # Persist a prefilter/dedup revisit as its OWN fresh observation (per-visit
  # chain pages/{page_key}/0,1,2,...) instead of writing no files. true = filtered
  # revisits are saved; false = restore no-write-on-revisit dedup. Default ON.
  # Env: MC_SCREEN_MATCHING_PERSIST_FILTERED
  persist_filtered: true
  # --- BM25 unique-page matching (Mobile3M mechanism) ---
  # BM25 candidate pages verified per screen (paper: top-5; reference code: 1).
  # Env: MC_SCREEN_MATCHING_BM25_TOP_K
  bm25_top_k: 5
  # Element-set same-page criterion. Options: diff | jaccard
  #   diff:    |A △ B| < element_diff_max      (paper default)
  #   jaccard: Jaccard(A, B) > element_jaccard_min  (reference code)
  # Env: MC_SCREEN_MATCHING_ELEMENT_CRITERION
  element_criterion: diff
  # Max differing element-lines to still count as the same page ('diff' mode).
  # Env: MC_SCREEN_MATCHING_ELEMENT_DIFF_MAX
  element_diff_max: 5
  # Min element-line Jaccard to count as the same page ('jaccard' mode).
  # Env: MC_SCREEN_MATCHING_ELEMENT_JACCARD_MIN
  element_jaccard_min: 0.5
  # Changed-pixel fraction below which the pixel gate confirms a page merge.
  # Env: MC_SCREEN_MATCHING_PAGE_PIXEL_DIFF_THRESHOLD
  page_pixel_diff_threshold: 0.3
  # --- Canvas-gated text-blind matching (S-9 map fragmentation) ---
  # When the current screen AND the candidate page are both canvas screens (a
  # full-screen interactive drawing surface: map / photo / game), compare the
  # element criterion on TEXT-BLIND element-lines (attributes, incl. aria-label,
  # kept) and let the pixel gate abstain. A panned map rewrites its scale bar,
  # distance and address readouts and repaints every tile, so both gates
  # otherwise measure viewport state, not page identity — that fragmented
  # osmand's map into 46 pages in one 2h run. Thresholds are the existing ones,
  # reused. Needs BOTH sides to be canvas, so it is inert in apps that have no
  # canvas screen. true | false. Env: MC_SCREEN_MATCHING_CANVAS_MERGE
  #
  # ⚠️ DEFAULT OFF — this fix is NOT SAFE YET. It halves map fragmentation
  # (osmand 46→27 / 26→14 map pages, offline replay) but it also merges screens
  # that are NOT the map: osmand's navigation DRAWER (15 menu items — the app's
  # main hub) and its turn-by-turn TRACKING mode both land on the map page. Two
  # reasons, both measured: (1) the drawer/nav overlays keep the map surface leaf
  # in the a11y tree, so is_canvas fires on them too — and a11y reports them as
  # MapActivity, so an activity guard would not catch it either; (2) their menu
  # items are plain TextViews with NO aria-label, so blinding text erases them to
  # identical <p></p> lines, and the SET-based element criterion then discards
  # cardinality (15 items and 3 items look the same). Restoring cardinality
  # (multiset diff) separates those screens — but it also breaks 20 of the 23
  # merges the fix performs, i.e. it destroys the fix. Refitting the threshold to
  # rescue it would be post-hoc fitting. So S-9 stays OPEN: diagnosed with
  # confidence (element-blocked, 95.6%/84.6%), no safe fix yet. Turn this on only
  # for an experiment arm, never for corpus collection.
  canvas_merge: false
  # A screen is "canvas" when some LEAF, clickable (or long-clickable) node
  # covers at least this fraction of the screen area. Detection is bounds-based,
  # not class-based: a map surface reaches the a11y tree as a plain leaf View
  # (osmand's covers 0.97 of the screen), never as SurfaceView/TextureView.
  # Env: MC_SCREEN_MATCHING_CANVAS_MIN_AREA_FRAC
  canvas_min_area_frac: 0.7
  # Same-package merge guard. A BM25 merge additionally requires the candidate
  # page to have been minted under the SAME package as the current screen — the
  # merge path never checked which APP a screen belonged to (only the structural
  # pre-filter keys on the activity), so a launcher/home frame sharing a few
  # generic element-lines could merge into an app's page (measured in the live
  # corpora, before any canvas change). Abstains when either package is unknown
  # (fail-open: a missing activity label must not fragment a page). Guards the
  # WHOLE merge path, not just canvas pairs. true | false.
  # Env: MC_SCREEN_MATCHING_PACKAGE_GUARD
  package_guard: true
