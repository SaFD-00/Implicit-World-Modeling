# Monkey-Collector — 수집 파라미터.
#
# Resolution order (later wins):
#   builtin defaults (src/monkey_collector/config.py) → run.yaml → MC_* env vars → CLI flags
#
# CLI flags take highest precedence. Operational flags (--force, --new-session, --apps)
# are CLI-only — not configurable here.
#
# Experiment runs sweep several keys. Canonical git default: exploration.strategy=BFS,
# collection.max_steps=1500, collection.action_delay_ms=1500, llm.element_extraction=false,
# screen_matching.luminance_prefilter=true, screen_matching.persist_filtered=true.
# Reset to these before committing.

exploration:
  # Traversal strategy. Options: DFS | BFS | GREEDY
  #   GREEDY: navigate to the nearest unexplored screen (minimum navigation cost) — current default
  #   BFS:    navigate to the shallowest unexplored screen (closest to app root first)
  #   DFS:    navigate to the deepest unexplored screen (deepest reachable screen first)
  # Env: MC_EXPLORATION_STRATEGY
  strategy: BFS

collection:
  # Max steps per app session. Env: MC_COLLECTION_MAX_STEPS
  max_steps: 1500
  # Random seed for the explorer. Env: MC_COLLECTION_SEED
  seed: 42
  # Delay between actions (milliseconds). Env: MC_COLLECTION_ACTION_DELAY_MS
  action_delay_ms: 1500
  # TCP server port. Env: MC_COLLECTION_PORT
  port: 12345
  # Durable data root (pages/observations, page_graph). Env: MC_COLLECTION_DATA_DIR
  data_dir: data
  # Ephemeral runtime root (metadata, events.jsonl, cost/coverage CSVs). Env: MC_COLLECTION_RUNTIME_DIR
  runtime_dir: runtime

llm:
  # Input text generation mode. Options: api | random
  #   api    = OpenRouter LLM (requires OPENROUTER_API_KEY)
  #   random = hardcoded fallback (no API cost)
  # Env: MC_LLM_INPUT_MODE
  input_mode: api
  # LLM element extraction + element-set screen matching. Options: true | false
  # Default false: the LLM is used for input-text generation ONLY. When true,
  # each screen is element-extracted (one LLM call) for element-set page identity;
  # disabled automatically when OPENROUTER_API_KEY is unset. Page/observation
  # dedup keeps working either way via the luminance/structural prefilter below.
  # Env: MC_LLM_ELEMENT_EXTRACTION
  element_extraction: false

screen_matching:
  # Two-sided tolerance band for OVERLAP element-set merges (0.0–1.0).
  # Env: MC_SCREEN_MATCHING_CLUSTER_MERGE_TOLERANCE
  cluster_merge_tolerance: 0.2
  # Max expand (re-extract on leftover UI) iterations per screen.
  # Env: MC_SCREEN_MATCHING_MAX_EXPAND_ITERS
  max_expand_iters: 3
  # Stage-0 luminance prefilter (MobileGPT-V2 port): dedup a near-pixel-identical
  # screen to a stored page with NO LLM call. Runs both alongside element-set
  # matching AND standalone (prefilter-only mode) when element_extraction is off,
  # so page/observation dedup survives with the LLM used for input text only.
  # Default ON.
  # Env: MC_SCREEN_MATCHING_LUMINANCE_PREFILTER
  luminance_prefilter: true
  # Per-pixel brightness |ΔY| above which a pixel counts as "changed" (0–255).
  # Env: MC_SCREEN_MATCHING_LUMINANCE_THRESHOLD
  luminance_threshold: 10
  # Fraction of changed pixels below which two screens are treated as the same page.
  # Env: MC_SCREEN_MATCHING_SCREENSHOT_DIFF_THRESHOLD
  screenshot_diff_threshold: 0.02
  # Downscale width (px) for the luminance fingerprint.
  # Env: MC_SCREEN_MATCHING_LUMINANCE_LOW_RES_WIDTH
  luminance_low_res_width: 100
  # Persist a prefilter/dedup revisit as its OWN fresh observation (per-visit
  # chain pages/{page_key}/0,1,2,...) instead of writing no files. true = filtered
  # revisits are saved; false = restore no-write-on-revisit dedup. Default ON.
  # Env: MC_SCREEN_MATCHING_PERSIST_FILTERED
  persist_filtered: true
